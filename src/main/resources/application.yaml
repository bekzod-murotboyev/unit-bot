server:
  port: 2000

spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update

bot:
  mode: development
  token: ${BOT_TOKEN:}
  domain: ${BOT_DOMAIN:}
  username: ${BOT_USERNAME:}
  i18n: on
  redis:
    enabled: true
  properties:
    catch-mapper-exception: true
    show-unmapped-request-log: true


spotify:
  client-id: #{SPOTIFY_CLIENT_ID}#
  client-secret: #{SPOTIFY_CLIENT_SECRET}#






